<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f8; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #16a34a; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-select-wrapper { position: relative; width: 100%; }
        .custom-select-trigger { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; white-space: nowrap; overflow: hidden; }
        .custom-options { position: absolute; display: none; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 50; margin-top: 4px; }
        .custom-options.open { display: block; }
        .option { padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.875rem; color: #4b5563; }
        .option:hover { background-color: #f3f4f6; color: #111827; }
        .search-in-dropdown { padding: 0.5rem; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; background: white; z-index: 10; }
        .notification-bell { position: relative; cursor: pointer; }
        .notification-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: none; }
        .notification-popup { position: absolute; top: 100%; right: 0; width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 100; margin-top: 8px; display: none; max-height: 300px; overflow-y: auto; }
        .notification-popup.open { display: block; }
    </style>
</head>
<body class="text-slate-800 relative">

    <script>
        const WEB_APP_URL = "https://inventory-backend-rwfi.onrender.com/api";
    </script>

    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-gray-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative">
            <div class="bg-green-600 h-2"></div>
            <div class="p-8">
                <div class="text-center mb-8">
                    <i class="fa-brands fa-shopify text-5xl text-green-600 mb-4"></i>
                    <h1 class="text-2xl font-bold text-gray-800">Store Login</h1>
                </div>
                <div class="space-y-4">
                    <select id="loginStoreSelect" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                        <option value="" disabled selected>Select Your Store</option>
                        <option value="admin">Admin</option>
                        <option value="dhanmondi">Dhanmondi Store</option>
                        <option value="banani">Banani Store</option>
                        <option value="uttara">Uttara Store</option>
                    </select>
                    <div id="passwordFieldWrapper" class="hidden">
                        <input type="password" id="loginPassword" placeholder="Enter Password" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <button id="loginBtn" onclick="attemptLogin()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition-colors disabled:opacity-50" disabled>Login</button>
                    <p id="loginError" class="text-red-500 text-xs mt-2 hidden text-center">Incorrect password</p>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white shadow-sm sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-3 py-3">
            <div class="flex justify-between items-start mb-3">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-shopify text-2xl text-green-600"></i>
                    <div>
                        <h1 class="font-bold text-base leading-tight text-gray-800">Store Manager</h1>
                    </div>
                </div>
                <div class="text-right flex items-center gap-3">
                    <div id="adminBellContainer" class="notification-bell hidden">
                        <i class="fa-solid fa-bell text-gray-600 text-lg" onclick="toggleAdminNotifications()"></i>
                        <span id="adminBellDot" class="notification-dot"></span>
                        <div id="adminNotificationPopup" class="notification-popup">
                            <div class="p-3 border-b border-gray-100 font-bold text-xs bg-gray-50">RECENT ACTIVITY</div>
                            <div id="adminNotificationList" class="divide-y divide-gray-100"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center justify-end gap-1 text-green-700 font-bold text-sm uppercase"><i class="fa-solid fa-store text-xs"></i> <span id="displayStoreName">...</span></div>
                        <button onclick="logout()" class="text-[10px] text-red-500 font-bold hover:underline mt-0.5">LOGOUT</button>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 w-full">
                <div class="custom-select-wrapper flex-1 min-w-0" id="customDropdown">
                    <div class="custom-select-trigger" onclick="toggleDropdown()">
                        <span id="dropdownSelectedText" class="truncate">Select Collection</span>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 ml-2"></i>
                    </div>
                    <div class="custom-options shadow-xl" id="dropdownOptions">
                        <div class="search-in-dropdown"><input type="text" id="dropdownSearchInput" placeholder="Search collection..." class="w-full text-xs p-2 border rounded" oninput="filterDropdownOptions()"></div>
                        <div class="max-h-48 overflow-y-auto custom-scroll" id="dropdownListContainer"></div>
                    </div>
                </div>
                <button onclick="clearFilters()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 w-9 h-9 rounded-lg flex-shrink-0 flex items-center justify-center border transition-colors"><i class="fa-solid fa-rotate-left text-xs"></i></button>
                <div class="flex-1 min-w-0 flex gap-2 items-center">
                    <input type="text" id="searchInput" placeholder="Search product..." class="w-full px-3 py-2 bg-gray-50 border rounded-lg text-xs font-medium focus:outline-none focus:border-green-500">
                    <button onclick="triggerSearchProcess()" class="bg-gray-900 text-white text-xs font-bold px-3 py-2 rounded-lg">Search</button>
                    <label class="hidden md:flex items-center gap-1.5 cursor-pointer bg-white border px-2 py-2 rounded-lg shadow-sm">
                        <input type="checkbox" id="autoTrimCheck" class="w-3.5 h-3.5 text-green-600 rounded"> <span class="text-[10px] font-bold uppercase">Auto</span>
                    </label>
                </div>
            </div>

            <div id="statsBar" class="hidden flex justify-between items-center mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-2">
                    <select id="sortFilter" class="text-xs border rounded px-2 py-1 bg-white h-8">
                        <option value="STATUS_ACTIVE">Active First</option>
                        <option value="CREATED_AT:true" selected>Date, new to old</option>
                    </select>
                    <div class="text-xs text-gray-500 bg-white px-2 py-1 rounded border h-8 flex items-center">Count: <span id="productCount" class="font-bold text-black ml-1">0</span></div>
                </div>
            </div>

            <div id="adminBulkBar" class="hidden mt-3 p-3 bg-red-50 border border-red-100 rounded-lg flex gap-3">
                <button onclick="selectAllActive()" class="text-[10px] bg-white border px-3 py-1.5 rounded font-semibold">Select Active</button>
                <button onclick="clearSelection()" class="text-[10px] bg-white border px-3 py-1.5 rounded font-semibold">Clear</button>
                <button id="zeroDraftBtn" onclick="executeZeroDraft()" class="bg-red-600 text-white text-[10px] font-bold px-4 py-1.5 rounded disabled:opacity-50" disabled>Zero Draft (<span id="selectedCount">0</span>)</button>
            </div>
        </div>
    </div>

    <div class="max-w-full mx-auto px-4 py-4">
        <div id="loadingState" class="hidden text-center py-20"><div class="loader"></div><p id="loadingText" class="text-xs text-gray-500 mt-2">Loading...</p></div>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 hidden"></div>
        <div id="emptyState" class="hidden text-center py-16"><p class="text-sm text-gray-500">No results found.</p></div>
        <div id="loadMoreContainer" class="hidden text-center mt-8 pb-10"><button onclick="loadMoreProducts()" class="bg-white border text-sm font-semibold px-6 py-2 rounded-full shadow-sm">Load More <i class="fa-solid fa-arrow-down ml-1"></i></button></div>
    </div>

    <div id="variantModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh]">
            <div class="bg-gray-50 px-5 py-3 border-b flex justify-between items-center">
                <div><h3 class="font-bold text-base truncate" id="modalProductName">...</h3><p class="text-[10px] text-gray-500 uppercase font-bold" id="modalStoreName">...</p></div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-5 overflow-y-auto custom-scroll flex-grow" id="modalVariantsContainer"></div>
            <div class="bg-gray-50 px-5 py-3 border-t flex justify-between gap-2">
                <button onclick="closeModal()" class="px-3 py-2 text-xs border rounded">Cancel</button>
                <div class="flex gap-2">
                    <button onclick="zeroAllVariantsInModal()" class="px-4 py-2 bg-red-100 text-red-600 text-xs font-bold rounded">Zero All</button>
                    <button id="saveBtn" onclick="saveInventoryChanges()" class="px-4 py-2 bg-black text-white text-xs font-bold rounded">Update</button>
                </div>
            </div>
        </div>
    </div>

    <div id="errorModal" class="fixed inset-0 z-[200] bg-black/90 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xs text-center overflow-hidden border border-red-200">
            <div class="bg-red-50 p-6 border-b border-red-100"><h2 class="text-xl font-bold text-red-600" id="errorModalMsg">Update Failed!</h2></div>
            <div class="p-6"><button onclick="document.getElementById('errorModal').classList.add('hidden')" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl">Try Again</button></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg translate-y-20 opacity-0 transition-all z-[60] flex items-center gap-2 text-xs"><i class="fa-solid fa-circle-check text-green-400"></i> <span id="toastMsg">Success</span></div>

    <script>
        let products = []; let currentStore = null; let currentEditingProductId = null; let lastCursor = null; let hasMoreProducts = false; let selectedCollectionId = "";
        
        window.addEventListener('DOMContentLoaded', () => {
            const savedStore = localStorage.getItem('storeUser');
            if (savedStore) {
                currentStore = savedStore;
                document.getElementById('displayStoreName').innerText = currentStore;
                document.getElementById('loginOverlay').style.display = 'none';
                loadInitialData(); 
            }
        });

        document.getElementById('loginStoreSelect').addEventListener('change', function() { if(this.value) { document.getElementById('passwordFieldWrapper').classList.remove('hidden'); document.getElementById('loginBtn').disabled = false; } });

        async function attemptLogin() {
            const selectedStore = document.getElementById('loginStoreSelect').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'login', store: selectedStore, password: password }) });
                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('storeUser', selectedStore); currentStore = selectedStore;
                    document.getElementById('displayStoreName').innerText = currentStore;
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadInitialData();
                } else { document.getElementById('loginError').classList.remove('hidden'); }
            } catch (error) { alert("Error"); }
        }

        function logout() { localStorage.removeItem('storeUser'); location.reload(); }

        async function saveInventoryChanges() {
            if (!currentEditingProductId) return;
            let btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerHTML = 'Saving...';
            try {
                const product = products.find(p => p.id == currentEditingProductId);
                let updates = [];
                const inputs = document.querySelectorAll('#modalVariantsContainer input.main-input');
                
                inputs.forEach(input => {
                    const variantId = input.getAttribute('data-variant-id');
                    const inventoryItemId = input.getAttribute('data-inventory-item-id');
                    const newQty = parseInt(input.value) || 0;
                    const originalQty = parseInt(input.getAttribute('data-original')) || 0;
                    
                    if (currentStore === 'admin') {
                        if (newQty !== originalQty) {
                            updates.push({ productId: product.id, variantId, inventoryItemId, store: 'admin', quantity: newQty, productName: product.title, actor: currentStore });
                        }
                        ['dhanmondi', 'banani', 'uttara'].forEach(storeName => {
                            const branchInput = document.getElementById(`fix-${storeName}-${variantId}`);
                            if (branchInput && (parseInt(branchInput.value) || 0) !== (parseInt(branchInput.getAttribute('data-original')) || 0)) {
                                updates.push({ productId: product.id, variantId, inventoryItemId, store: storeName, quantity: parseInt(branchInput.value) || 0, productName: product.title, actor: currentStore });
                            }
                        });
                    } else {
                        if (newQty !== originalQty) {
                            updates.push({ productId: product.id, variantId, inventoryItemId, store: currentStore, quantity: newQty, productName: product.title, actor: currentStore });
                        }
                    }
                });

                if (updates.length > 0) {
                    const res = await fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'batchUpdateInventory', updates: updates }) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        closeModal(); performSearch(document.getElementById('searchInput').value, selectedCollectionId, null); showToast("Updated Successfully!");
                    } else { throw new Error("Shopify rejected the update!"); }
                } else { closeModal(); }
            } catch (error) {
                document.getElementById('errorModalMsg').innerText = error.message || "Update Failed!";
                document.getElementById('errorModal').classList.remove('hidden');
            } finally { btn.disabled = false; btn.innerHTML = 'Update'; }
        }

        async function loadInitialData() {
            toggleLoading(true);
            const res = await fetch(`${WEB_APP_URL}?action=getInitialData&store=${currentStore}`);
            const data = await res.json();
            if(data.status === 'success') {
                populateCustomDropdown(data.collections);
                handleNotifications(data.notifications);
                toggleLoading(false);
            }
        }

        function handleNotifications(notifications) {
            const bellContainer = document.getElementById('adminBellContainer');
            const list = document.getElementById('adminNotificationList');
            const dot = document.getElementById('adminBellDot');
            bellContainer.classList.remove('hidden');
            if (notifications && notifications.length > 0) {
                dot.style.display = 'block'; list.innerHTML = '';
                notifications.forEach(notif => {
                    const div = document.createElement('div'); div.className = 'p-3 hover:bg-gray-50 border-b cursor-pointer';
                    div.innerHTML = `<p class="text-xs">${notif.msg}</p>`;
                    div.onclick = () => { document.getElementById('searchInput').value = notif.collection; triggerSearchProcess(); };
                    list.appendChild(div);
                });
            } else { dot.style.display = 'none'; list.innerHTML = '<p class="p-4 text-xs text-center text-gray-400">No updates</p>'; }
        }

        async function performSearch(query, collectionId, cursor = null) {
            toggleLoading(true);
            const sortVal = document.getElementById('sortFilter').value;
            const [sortKey, reverse] = sortVal.split(':');
            let url = `${WEB_APP_URL}?action=searchProducts&sortKey=${sortKey}&reverse=${reverse}`;
            if(query) url += `&query=${encodeURIComponent(query)}`;
            if(collectionId) url += `&collectionId=${encodeURIComponent(collectionId)}`;
            if(cursor) url += `&cursor=${encodeURIComponent(cursor)}`;

            const res = await fetch(url); const data = await res.json();
            if(data.status === 'success') {
                if (cursor) products = products.concat(data.products); else products = data.products;
                lastCursor = data.pageInfo.endCursor; hasMoreProducts = data.pageInfo.hasNextPage;
                renderProducts();
            }
            toggleLoading(false);
        }

        function populateCustomDropdown(list) {
            const container = document.getElementById('dropdownListContainer'); container.innerHTML = '<div class="option" onclick="selectCollection(\'\', \'All Collections\')">All Collections</div>';
            list.forEach(col => { container.innerHTML += `<div class="option" onclick="selectCollection('${col.id}', '${col.title.replace(/'/g, "\\'")}')">${col.title}</div>`; });
        }
        function toggleDropdown() { document.getElementById('dropdownOptions').classList.toggle('open'); }
        function selectCollection(id, title) {
            selectedCollectionId = id; document.getElementById('dropdownSelectedText').innerText = title;
            document.getElementById('dropdownOptions').classList.remove('open');
            performSearch(null, id);
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid'); grid.innerHTML = '';
            document.getElementById('statsBar').classList.remove('hidden'); document.getElementById('productCount').innerText = products.length;
            if (currentStore === 'admin') document.getElementById('adminBulkBar').classList.remove('hidden');
            
            if (products.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); return; }
            document.getElementById('emptyState').classList.add('hidden'); grid.classList.remove('hidden');
            
            products.forEach(p => {
                let totalStock = 0; p.variants.forEach(v => { totalStock += currentStore === 'admin' ? v.inventory.admin : v.inventory[currentStore]; });
                let checks = currentStore === 'admin' ? `<input type="checkbox" class="bulk-check absolute top-2 left-2 w-5 h-5" data-id="${p.id}" data-status="${p.status}">` : '';
                grid.innerHTML += `<div class="product-card bg-white rounded-xl shadow border p-3 relative flex flex-col">${checks}<img src="${p.image}" class="h-32 object-contain mb-2"><h3 class="text-sm font-bold mb-1">${p.title}</h3><p class="text-xs font-semibold mb-2">Total: ${totalStock}</p><button onclick="openModal('${p.id}')" class="mt-auto bg-black text-white text-xs py-2 rounded">Manage</button></div>`;
            });
            document.getElementById('loadMoreContainer').classList.toggle('hidden', !hasMoreProducts);
        }

        function openModal(productId) {
            const p = products.find(p => p.id == productId); currentEditingProductId = productId;
            document.getElementById('modalProductName').innerText = p.title; document.getElementById('modalStoreName').innerText = currentStore;
            const container = document.getElementById('modalVariantsContainer'); container.innerHTML = '';
            
            p.variants.forEach(v => {
                const myStock = currentStore === 'admin' ? v.inventory.admin : v.inventory[currentStore];
                let adminFixHtml = currentStore === 'admin' ? `
                    <div class="grid grid-cols-3 gap-2 mt-2 pt-2 border-t">
                        ${['dhanmondi', 'banani', 'uttara'].map(s => `
                            <div><label class="text-[8px] uppercase">${s.substr(0,3)}</label><input type="number" id="fix-${s}-${v.id}" value="${v.inventory[s]}" data-original="${v.inventory[s]}" class="w-full text-xs border rounded p-1 text-center"></div>
                        `).join('')}
                    </div>` : '';

                container.innerHTML += `<div class="bg-gray-50 p-3 rounded border mb-2"><div class="flex justify-between items-center"><p class="text-xs font-bold">${v.title}</p><input type="number" id="input-${v.id}" value="${myStock}" data-original="${myStock}" class="main-input w-16 text-center border rounded py-1 font-bold" data-variant-id="${v.id}" data-inventory-item-id="${v.inventoryItemId}"></div>${adminFixHtml}</div>`;
            });
            document.getElementById('variantModal').classList.remove('hidden');
        }

        function toggleLoading(show) { document.getElementById('loadingState').classList.toggle('hidden', !show); document.getElementById('productGrid').classList.toggle('hidden', show); }
        function closeModal() { document.getElementById('variantModal').classList.add('hidden'); }
        function showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg; t.classList.remove('translate-y-20', 'opacity-0'); setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000); }
        function triggerSearchProcess() { performSearch(document.getElementById('searchInput').value, selectedCollectionId); }
        function clearFilters() { document.getElementById('searchInput').value = ''; selectCollection('','Select Collection'); }
        function toggleAdminNotifications() { document.getElementById('adminNotificationPopup').classList.toggle('open'); }
        function loadMoreProducts() { performSearch(document.getElementById('searchInput').value, selectedCollectionId, lastCursor); }
    </script>
</body>
</html>
